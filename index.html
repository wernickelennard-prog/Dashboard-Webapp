<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    <title>Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230a0a0a'/><rect x='4' y='4' width='10' height='10' rx='3' fill='%23fde047'/><rect x='18' y='4' width='10' height='10' rx='3' fill='%23fde047' opacity='0.6'/><rect x='4' y='18' width='10' height='10' rx='3' fill='%23fde047' opacity='0.6'/><rect x='18' y='18' width='10' height='10' rx='3' fill='%23fde047'/></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/waltograph" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="noise"></div>

<div class="main-wrapper">

    <header class="top-nav">
        <div class="header-left">
            <p id="date">Lade...</p>
            <h1 id="clock">00:00</h1>
        </div>
        <div class="header-btns">
            <button onclick="toggleModal('link-modal')" class="nav-btn"><i class="fas fa-link"></i><span>Links</span></button>
            <button onclick="toggleModal('style-modal')" class="nav-btn"><i class="fas fa-palette"></i><span>Style</span></button>
        </div>
    </header>
<section class="search-section">
    <form id="search-form" class="search-pill"> <i class="fas fa-search search-icon"></i>
        <input type="text" id="search-input" name="q" placeholder="Suchen..." autocomplete="off">
        <button type="submit" class="search-submit"><i class="fas fa-arrow-right"></i></button>
    </form>
    <div id="search-history" class="search-history-dropdown"></div>
</section>

    <main class="grid" id="main-grid">



        
       <!-- WETTER -->
        <div class="card weather-card">
            <div class="weather-main">
                <i id="w-icon" class="fas fa-sun weather-icon"></i>
                <div class="weather-info">
                    <span id="temp" class="temp-display">--°</span>
                    <p id="weather-desc">Lädt...</p>
                </div>
            </div>
            <div class="weather-details">
                <span><i class="fas fa-droplet"></i> <span id="humidity">--%</span></span>
                <span><i class="fas fa-wind"></i> <span id="wind">-- km/h</span></span>
                <span><i class="fas fa-location-dot"></i> <span id="city">--</span></span>
            </div>
        </div>

        
        <!-- TODO -->
        <div class="card todo-card">
            <div class="card-header">
                <h3><i class="fas fa-check-circle"></i> Aufgaben</h3>
                <span id="todo-count" class="badge">0</span>
            </div>
            <div class="todo-input-row">
                <input type="text" id="todo-in" placeholder="Neue Aufgabe..." onkeydown="if(event.key==='Enter')addTodo()">
                <button onclick="addTodo()" class="icon-btn"><i class="fas fa-plus"></i></button>
            </div>
            <ul id="todo-list"></ul>
        </div>

        <!-- APP SHORTCUTS -->
        <div class="card app-card" onclick="openApp('netflix://', 'https://www.netflix.com')">
            <img class="app-logo" src="https://cdn.jsdelivr.net/npm/simple-icons@latest/icons/netflix.svg" alt="Netflix">
        </div>

        <div class="card app-card" onclick="openApp('vnd.youtube://', 'https://www.youtube.com')">
            <img class="app-logo" src="https://cdn.jsdelivr.net/npm/simple-icons@latest/icons/youtube.svg" alt="YouTube">
        </div>

        <div class="card app-card" onclick="openApp('disneyplus://', 'https://www.disneyplus.com')">
            <img class="app-logo" src="https://cnbl-cdn.bamgrid.com/assets/7ecc8bcb60ad77193058d63e321bd21cbac2fc67281dbd9927676ea4a4c83594/original" alt="Disney+">
        </div>

        <div class="card app-card" onclick="openApp('hbomax://', 'https://www.max.com')">
            <img class="app-logo" src="https://cdn.jsdelivr.net/npm/simple-icons@latest/icons/hbomax.svg" alt="HBO MAX">
        </div>

        <!-- CUSTOM LINKS -->
        <div class="card links-card" id="links-display">
            <div class="card-header">
                <h3><i class="fas fa-bookmark"></i> Meine Links</h3>
            </div>
            <div id="links-grid"></div>
            <button onclick="toggleModal('link-modal')" class="add-link-btn"><i class="fas fa-plus"></i> Link hinzufügen</button>
        </div>

<div class="card links-card social-section">
    <div class="card-header">
        <h3><i class="fa-regular fa-flag"></i> Mehr von mir!</h3>
    </div>
    <div class="social-links-grid">
        <a href="https://bakeandcookrecipelennardw.vercel.app/" target="_blank" class="social-item">
            <i class="fa-solid fa-cookie"></i>
            <span>Back&Cook</span>
        </a>
        <a href="https://haushaltsbuchbylennard.vercel.app/" target="_blank" class="social-item">
            <i class="fa-solid fa-book"></i>
            <span>Haushaltsbuch</span>
        </a>
        <a href="https://theminimalastnewscanavas.vercel.app/" target="_blank" class="social-item">
            <i class="fa-solid fa-align-right"></i>
            <span>The Minimalist News Canavas</span>
        </a>
        <a href="https://routen-planerlennardw.vercel.app/" target="_blank" class="social-item">
            <i class="fa-solid fa-map-pin"></i>
            <span>Routen planer</span>
        </a>
        <a href="https://surtsey-dielebendevulkaninselbylennard.vercel.app/" target="_blank" class="social-item">
            <i class="fa-solid fa-volcano"></i>
            <span>Surtsey- Die lebende Vulkaninsel</span>
        </a>
        <a href="https://archiv-core-bylennard.vercel.app/" target="_blank" class="social-item">
            <i class="fa-regular fa-file-zipper"></i>
            <span>.Zip-ArchivCore</span>
        </a>
        <a target="_blank" class="social-item">
            <i class="fa-regular fa-alarm-clock"></i>
            <span>Kommt bald!</span>
        </a>
    </div>
</div>

        
    </main>
</div>

<!-- STYLE MODAL -->
<div id="style-modal" class="modal-overlay" onclick="closeOnOverlay(event,'style-modal')">
    <div class="modal-box">
        <div class="modal-header">
            <h3>Design wählen</h3>
            <button class="modal-close" onclick="toggleModal('style-modal')"><i class="fas fa-xmark"></i></button>
        </div>
        <div class="theme-grid">
            <button class="t-btn" data-theme-name="dark" onclick="setTheme('dark')">
                <span class="t-swatch" style="background:#0a0a0a;border-color:#fde047"></span>
                <span>Batman</span>
            </button>
            <button class="t-btn" data-theme-name="hellokitty" onclick="setTheme('hellokitty')">
                <span class="t-swatch" style="background:#ffdae9;border-color:#ff4d94"></span>
                <span>Pink</span>
            </button>
            <button class="t-btn" data-theme-name="capybara" onclick="setTheme('capybara')">
                <span class="t-swatch" style="background:#f5ebe0;border-color:#a98467"></span>
                <span>Capy</span>
            </button>
            <button class="t-btn" data-theme-name="spiderman" onclick="setTheme('spiderman')">
                <span class="t-swatch" style="background:#b91c1c;border-color:#ffffff"></span>
                <span>Spidey</span>
            </button>
            <button class="t-btn" data-theme-name="ocean" onclick="setTheme('ocean')">
                <span class="t-swatch" style="background:#0d1b2a;border-color:#00d4ff"></span>
                <span>Ocean</span>
            </button>
            <button class="t-btn" data-theme-name="forest" onclick="setTheme('forest')">
                <span class="t-swatch" style="background:#1a2e1a;border-color:#4ade80"></span>
                <span>Forest</span>
            </button>
        </div>
    </div>
</div>

<!-- LINK MODAL -->
<div id="link-modal" class="modal-overlay" onclick="closeOnOverlay(event,'link-modal')">
    <div class="modal-box">
        <div class="modal-header">
            <h3>Links verwalten</h3>
            <button class="modal-close" onclick="toggleModal('link-modal')"><i class="fas fa-xmark"></i></button>
        </div>
        <div class="link-input-group">
            <input type="text" id="link-name" placeholder="Name (z.B. GitHub)">
            <input type="text" id="link-url" placeholder="URL (z.B. https://github.com)">
            <button onclick="addLink()" class="icon-btn"><i class="fas fa-plus"></i></button>
        </div>
        <div id="link-list" class="link-list-modal"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
