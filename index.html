<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230a0a0a'/><rect x='4' y='4' width='10' height='10' rx='3' fill='%23fde047'/><rect x='18' y='4' width='10' height='10' rx='3' fill='%23fde047' opacity='0.6'/><rect x='4' y='18' width='10' height='10' rx='3' fill='%23fde047' opacity='0.6'/><rect x='18' y='18' width='10' height='10' rx='3' fill='%23fde047'/></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/waltograph" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="noise"></div>

<div class="main-wrapper">

    <header class="top-nav">
        <div class="header-left">
            <p id="date">Lade...</p>
            <h1 id="clock">00:00</h1>
        </div>
        <div class="header-btns">
            <button onclick="toggleModal('link-modal')" class="nav-btn"><i class="fas fa-link"></i><span>Links</span></button>
            <button onclick="toggleModal('style-modal')" class="nav-btn"><i class="fas fa-palette"></i><span>Style</span></button>
        </div>
    </header>

    <section class="search-section">
        <form action="https://www.google.com/search" method="GET" target="_blank" class="search-pill">
            <i class="fas fa-search search-icon"></i>
            <input type="text" name="q" placeholder="Suchen..." autocomplete="off">
            <button type="submit" class="search-submit"><i class="fas fa-arrow-right"></i></button>
        </form>
    </section>

    <main class="grid" id="main-grid">

        <!-- WETTER -->
        <div class="card weather-card">
            <div class="weather-main">
                <i id="w-icon" class="fas fa-sun weather-icon"></i>
                <div class="weather-info">
                    <span id="temp" class="temp-display">--°</span>
                    <p id="weather-desc">Lädt...</p>
                </div>
            </div>
            <div class="weather-details">
                <span><i class="fas fa-droplet"></i> <span id="humidity">--%</span></span>
                <span><i class="fas fa-wind"></i> <span id="wind">-- km/h</span></span>
                <span><i class="fas fa-location-dot"></i> <span id="city">--</span></span>
            </div>
        </div>

        <!-- TODO -->
        <div class="card todo-card">
            <div class="card-header">
                <h3><i class="fas fa-check-circle"></i> Aufgaben</h3>
                <span id="todo-count" class="badge">0</span>
            </div>
            <div class="todo-input-row">
                <input type="text" id="todo-in" placeholder="Neue Aufgabe..." onkeydown="if(event.key==='Enter')addTodo()">
                <button onclick="addTodo()" class="icon-btn"><i class="fas fa-plus"></i></button>
            </div>
            <ul id="todo-list"></ul>
        </div>

        <!-- APP SHORTCUTS -->
        <div class="card app-card" onclick="window.open('https://www.netflix.com')">
            <img class="app-logo" src="https://cdn.jsdelivr.net/npm/simple-icons@latest/icons/netflix.svg" alt="Netflix">
        </div>

        <div class="card app-card" onclick="window.open('https://www.youtube.com')">
            <img class="app-logo" src="https://cdn.jsdelivr.net/npm/simple-icons@latest/icons/youtube.svg" alt="YouTube">
        </div>

        <div class="card app-card" onclick="window.open('https://www.disneyplus.com')">
            <!-- Disney Wordmark — echte SVG Pfade, keine Schriftart nötig -->
            <svg class="app-logo app-logo--svg" viewBox="0 0 700 294" xmlns="http://www.w3.org/2000/svg">
                <path fill="white" d="M 87.07 98.416 C 87.07 98.416 80.371 96.979 72.52 96.979 C 48.139 96.979 30.82 111.439 30.82 139.196 C 30.82 166.953 48.139 181.413 72.52 181.413 C 80.371 181.413 87.07 179.976 87.07 179.976 L 87.07 98.416 Z M 104.744 190.843 C 104.744 190.843 92.98 194.434 72.52 194.434 C 37.519 194.434 13.146 173.652 13.146 139.196 C 13.146 104.74 37.519 83.958 72.52 83.958 C 92.98 83.958 104.744 87.549 104.744 87.549 L 104.744 190.843 Z M 189.873 150.117 L 165.847 150.117 L 165.847 193.716 L 148.173 193.716 L 148.173 84.676 L 165.847 84.676 L 165.847 137.814 L 189.873 137.814 L 189.873 84.676 L 207.547 84.676 L 207.547 193.716 L 189.873 193.716 L 189.873 150.117 Z M 243.372 84.676 L 261.046 84.676 L 261.046 193.716 L 243.372 193.716 L 243.372 84.676 Z M 344.312 84.676 L 344.312 98.775 L 317.197 98.775 L 317.197 193.716 L 299.523 193.716 L 299.523 98.775 L 272.408 98.775 L 272.408 84.676 L 344.312 84.676 Z M 417.738 84.676 L 417.738 98.775 L 373.794 98.775 L 373.794 131.659 L 411.039 131.659 L 411.039 145.758 L 373.794 145.758 L 373.794 179.617 L 417.738 179.617 L 417.738 193.716 L 356.12 193.716 L 356.12 84.676 L 417.738 84.676 Z M 497.586 193.716 L 453.648 120.392 L 453.648 193.716 L 435.974 193.716 L 435.974 84.676 L 453.648 84.676 L 495.87 155.912 L 495.87 84.676 L 513.544 84.676 L 513.544 193.716 L 497.586 193.716 Z M 596.547 109.278 C 596.547 109.278 585.494 96.979 567.829 96.979 C 550.164 96.979 539.114 107.557 539.114 124.727 C 539.114 141.897 552.23 148.329 569.538 154.399 C 586.846 160.469 602.871 167.28 602.871 187.323 C 602.871 207.366 588.196 208.803 588.196 208.803 L 596.547 222.183 C 596.547 222.183 621.279 218.951 621.279 186.607 C 621.279 154.263 601.171 147.814 585.137 141.718 C 569.103 135.622 557.504 130.606 557.504 115.783 C 557.504 100.96 568.187 97.338 578.878 97.338 C 589.569 97.338 596.547 103.208 596.547 103.208 L 596.547 109.278 Z M 665.793 84.676 C 665.793 84.676 685.185 84.676 685.185 104.899 C 685.185 125.122 667.             </svg>
        </div>

        <div class="card app-card" onclick="window.open('https://www.max.com')">
            <img class="app-logo" src="https://cdn.jsdelivr.net/npm/simple-icons@latest/icons/hbomax.svg" alt="HBO MAX">
        </div>

        <!-- CUSTOM LINKS -->
        <div class="card links-card" id="links-display">
            <div class="card-header">
                <h3><i class="fas fa-bookmark"></i> Meine Links</h3>
            </div>
            <div id="links-grid"></div>
            <button onclick="toggleModal('link-modal')" class="add-link-btn"><i class="fas fa-plus"></i> Link hinzufügen</button>
        </div>

    </main>
</div>

<!-- STYLE MODAL -->
<div id="style-modal" class="modal-overlay" onclick="closeOnOverlay(event,'style-modal')">
    <div class="modal-box">
        <div class="modal-header">
            <h3>Design wählen</h3>
            <button class="modal-close" onclick="toggleModal('style-modal')"><i class="fas fa-xmark"></i></button>
        </div>
        <div class="theme-grid">
            <button class="t-btn" data-theme-name="dark" onclick="setTheme('dark')">
                <span class="t-swatch" style="background:#0a0a0a;border-color:#fde047"></span>
                <span>Batman</span>
            </button>
            <button class="t-btn" data-theme-name="hellokitty" onclick="setTheme('hellokitty')">
                <span class="t-swatch" style="background:#ffdae9;border-color:#ff4d94"></span>
                <span>Pink</span>
            </button>
            <button class="t-btn" data-theme-name="capybara" onclick="setTheme('capybara')">
                <span class="t-swatch" style="background:#f5ebe0;border-color:#a98467"></span>
                <span>Capy</span>
            </button>
            <button class="t-btn" data-theme-name="spiderman" onclick="setTheme('spiderman')">
                <span class="t-swatch" style="background:#b91c1c;border-color:#ffffff"></span>
                <span>Spidey</span>
            </button>
            <button class="t-btn" data-theme-name="ocean" onclick="setTheme('ocean')">
                <span class="t-swatch" style="background:#0d1b2a;border-color:#00d4ff"></span>
                <span>Ocean</span>
            </button>
            <button class="t-btn" data-theme-name="forest" onclick="setTheme('forest')">
                <span class="t-swatch" style="background:#1a2e1a;border-color:#4ade80"></span>
                <span>Forest</span>
            </button>
        </div>
    </div>
</div>

<!-- LINK MODAL -->
<div id="link-modal" class="modal-overlay" onclick="closeOnOverlay(event,'link-modal')">
    <div class="modal-box">
        <div class="modal-header">
            <h3>Links verwalten</h3>
            <button class="modal-close" onclick="toggleModal('link-modal')"><i class="fas fa-xmark"></i></button>
        </div>
        <div class="link-input-group">
            <input type="text" id="link-name" placeholder="Name (z.B. GitHub)">
            <input type="text" id="link-url" placeholder="URL (z.B. https://github.com)">
            <button onclick="addLink()" class="icon-btn"><i class="fas fa-plus"></i></button>
        </div>
        <div id="link-list" class="link-list-modal"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
